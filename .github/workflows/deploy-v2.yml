name: Deploy v2

on:
  push:
    branches:
      - feature/v2
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Go test
        run: go test ./...
        working-directory: v2/backend

      - name: Go build API
        run: GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o /dev/null ./cmd/api
        working-directory: v2/backend

      - name: Go build Sync
        run: GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o /dev/null ./cmd/sync
        working-directory: v2/backend

      - name: npm install
        run: npm install
        working-directory: v2/frontend

      - name: npm build
        run: npm run build
        working-directory: v2/frontend

  deploy:
    name: Deploy
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/v2' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: v2
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name expense-tally-v2 \
            --resolve-s3 \
            --s3-prefix expense-tally-v2 \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-confirm-changeset \
            --parameter-overrides Environment=${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }} CognitoDomainPrefix=${{ secrets.COGNITO_DOMAIN_PREFIX }}

      - name: npm install (frontend)
        run: npm install
        working-directory: v2/frontend

      - name: npm build (frontend)
        run: npm run build
        working-directory: v2/frontend

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name expense-tally-v2 --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' --output text)
          DIST_ID=$(aws cloudformation describe-stacks --stack-name expense-tally-v2 --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: aws s3 sync frontend/dist s3://${{ steps.stack.outputs.bucket }} --delete
        working-directory: v2

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.stack.outputs.distribution_id }} --paths "/*"
